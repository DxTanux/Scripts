<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>正在跳转至浙江省教育考试院</title>
    <!-- 为了更好的用户体验，添加一些基础样式，同时确保跳转迅速且符合现代浏览器安全规范 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 1rem;
        }

        /* 跳转过渡卡片样式 - 优雅提示，非强制停留，仅在重定向过程中展示 */
        .redirect-container {
            background: white;
            max-width: 500px;
            width: 100%;
            padding: 2rem 1.8rem;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15), 0 1px 3px rgba(0, 0, 0, 0.05);
            text-align: center;
            backdrop-filter: blur(0px);
            transition: all 0.2s ease;
        }

        .icon-wrapper {
            margin-bottom: 1.5rem;
        }

        .redirect-icon {
            width: 70px;
            height: 70px;
            background: #eef2ff;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: #1e293b;
            letter-spacing: -0.3px;
        }

        .info-text {
            font-size: 1rem;
            color: #334155;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .target-url {
            background: #f8fafc;
            border-radius: 48px;
            padding: 0.6rem 1rem;
            display: inline-block;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.9rem;
            color: #0f3b5f;
            word-break: break-all;
            border: 1px solid #e2e8f0;
            margin-bottom: 1.8rem;
            max-width: 100%;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin: 1rem 0 1.2rem 0;
        }

        .progress-fill {
            width: 70%;
            height: 100%;
            background: #2563eb;
            border-radius: 10px;
            animation: loadingProgress 1.2s ease-in-out infinite alternate;
        }

        @keyframes loadingProgress {
            0% {
                width: 15%;
                background-color: #3b82f6;
            }
            100% {
                width: 95%;
                background-color: #1d4ed8;
            }
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .btn {
            border: none;
            background: none;
            font-size: 0.9rem;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: #2563eb;
            color: white;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #ffffff;
            color: #334155;
            border: 1px solid #cbd5e1;
        }

        .btn-secondary:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #64748b;
            text-align: center;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        /* 针对移动端优化 */
        @media (max-width: 500px) {
            .redirect-container {
                padding: 1.6rem 1.2rem;
            }
            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
    <!-- 立即执行JavaScript重定向，保证自动跳转，同时提供后备手动跳转 -->
    <script>
        // 目标地址：浙江省教育考试院官网
        const TARGET_URL = 'https://www.zjzs.net';
        
        // 方法：安全跳转，保留历史记录？通常跳转不希望用户返回此中间页，使用 location.replace 更干净，但也可用 location.href
        // 但为了确保用户如果需要回退也可以，但一般教育考试跳转最好是直接替换当前历史记录，防止用户通过后退又回到本页。大多数场景推荐 replace。
        // 但为了兼容一些浏览器策略以及确保跳转体验，立即执行 replace 跳转。
        // 但是用户可能由于网络策略/弹窗拦截等原因未触发？实际上 script 会立即执行，但如果用户浏览器安全设置禁止重定向? 极少见，但提供手动点击按钮保证。
        // 另外，为了展现友好过渡，延迟极短时间(50ms以内)再跳转，同时保证页面加载时已经开启跳转，不阻塞视觉。
        // 若用户页面加载缓慢，依然确保最终跳转。 实现优雅体验: 加载即跳转，但保留手动干预能力。
        
        // 设置一个标志避免重复跳转
        let redirectExecuted = false;
        
        function performRedirect(replaceHistory = true) {
            if (redirectExecuted) return;
            redirectExecuted = true;
            // 使用 replace 方法避免产生多余的 history 条目，这样用户在新页面点击后退不会回到这个过渡页
            if (replaceHistory) {
                window.location.replace(TARGET_URL);
            } else {
                window.location.href = TARGET_URL;
            }
        }
        
        // 页面加载后立即执行自动重定向（稍微延迟确保样式渲染，但绝对不影响跳转速度，可零延迟或极小延迟）
        // 同时为了防止某些环境下 window.location 被阻止，提供一个后备，但现代浏览器极少会阻塞同步跳转。
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                // DOMContentLoaded 触发时立即执行跳转，耗时通常低于10ms，页面视觉一闪而过
                performRedirect(true);
            });
        } else {
            performRedirect(true);
        }
        
        // 额外保险: 如果因为某些奇怪原因（比如用户点击浏览器停止加载）在1.2秒后仍未跳转，再强制尝试一次
        setTimeout(function() {
            if (!redirectExecuted) {
                performRedirect(true);
            }
        }, 1200);
        
        // 提供手动跳转函数供按钮调用（用户主动点击）
        function manualRedirect() {
            if (!redirectExecuted) {
                performRedirect(false); // 手动可使用 href 保留历史，不过也无伤大雅，但还是确保可以跳转
            } else {
                // 如果已经跳转过但是页面由于某些原因还停留，直接重定向
                window.location.href = TARGET_URL;
            }
        }
        
        // 暴露给全局，让HTML按钮可以调用
        window.manualRedirect = manualRedirect;
    </script>
</head>
<body>
    <div class="redirect-container">
        <div class="icon-wrapper">
            <div class="redirect-icon">
                🔗
            </div>
        </div>
        <h1>正在跳转至</h1>
        <div class="target-url">
            zjzs.net — 浙江省教育考试院
        </div>
        <div class="info-text">
            即将为您安全引导至官方招生考试服务平台<br>
            如果浏览器没有自动跳转，请点击下方按钮。
        </div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <div class="action-buttons">
            <button class="btn btn-primary" onclick="window.manualRedirect && window.manualRedirect();">
                ⚡ 立即跳转
            </button>
            <a href="https://www.zjzs.net" class="btn btn-secondary" target="_blank" rel="noopener noreferrer">
                🔗 新窗口打开
            </a>
        </div>
        <div class="footer-note">
            浙江省教育考试院官方网址：<strong>https://www.zjzs.net</strong><br>
            安全连接 · 信息仅供参考
        </div>
    </div>
    <!-- 额外的noscript友好提醒：如果用户禁用了JavaScript，提供HTML层面的跳转meta和链接 -->
    <noscript>
        <div style="margin-top: 20px; background: #fff3cd; border-radius: 24px; padding: 1rem; max-width: 500px; text-align: center; font-family: system-ui; margin-left: auto; margin-right: auto;">
            <p>⚠️ 您的浏览器未启用JavaScript，无法自动跳转。</p>
            <p>请点击下方链接手动访问：</p>
            <a href="https://www.zjzs.net" style="font-weight: bold; color: #2563eb; font-size: 1.1rem;">浙江省教育考试院官网 →</a>
        </div>
        <!-- 对于不支持JS的老旧浏览器，也可利用meta刷新，不过noscript内部meta无效，但可以提供纯链接 -->
        <meta http-equiv="refresh" content="2; url=https://www.zjzs.net">
    </noscript>
</body>
</html>
